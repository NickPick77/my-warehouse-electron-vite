name: Build/release My Warehouse app

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      tags:
        description: 'Test scenario tags'
        required: true
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: false
  push:
    tags:
      - v*.*.*

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        node-version: ['20.10.x']

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.10'
      
      - name: Install Dependencies
        run:  npm install

      # - name: build-linux
      #   if: matrix.os == 'ubuntu-latest'
      #   run: npm run build:linux

      - name: build-mac
        if: matrix.os == 'macos-latest'
        run: npm run build:mac


      - name: build-win
        if: matrix.os == 'windows-latest'
        run: npm run build:win

      - name: Compile Electron App
        uses: x6Pnda/action-electron-compiler@v1
        with:
                  # GitHub token, automatically provided to the action
                  # (Optional)
          github_token: ${{ secrets.github_token }}

                  # If the commit is tagged with a version (e.g. "v1.0.0"),
                  # (Optional)
          release: ${{ startsWith(github.ref, 'refs/tags/v') }}

                  # Package manager. NPM, PNPM and Yarn supported. Install Yarn and PNPM yourself. Default is NPM
                  # (Optional)
          package_manager: NPM

                  # Skip buiding the application
                  # (Optional)
          skip_build: false
